<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例漫画页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .page {
            background: white;
            padding: 40px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .page-number {
            text-align: center;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>示例漫画页面</h1>
    <p>这些是占位页面，请右键保存并替换为你的真实漫画页面。</p>
    
    <div class="page">
        <div style="text-align: center;">
            <h2 style="color: #6366f1;">第一章 第1页</h2>
            <p style="color: #666;">请替换为你的漫画页面</p>
        </div>
    </div>
    <div class="page-number">page1.jpg</div>

    <div class="page">
        <div style="text-align: center;">
            <h2 style="color: #8b5cf6;">第一章 第2页</h2>
            <p style="color: #666;">请替换为你的漫画页面</p>
        </div>
    </div>
    <div class="page-number">page2.jpg</div>

    <div class="page">
        <div style="text-align: center;">
            <h2 style="color: #a855f7;">第一章 第3页</h2>
            <p style="color: #666;">请替换为你的漫画页面</p>
        </div>
    </div>
    <div class="page-number">page3.jpg</div>

    <div style="background: white; padding: 20px; border-radius: 8px; margin-top: 20px;">
        <h3>使用说明：</h3>
        <ol>
            <li>截取每个页面的截图或导出为图片</li>
            <li>命名为 page1.jpg, page2.jpg, page3.jpg 等</li>
            <li>保存到 images/comic/chapter1/ 目录</li>
            <li>在 js/main.js 中更新总页数</li>
        </ol>
    </div>
</body>
</html>
